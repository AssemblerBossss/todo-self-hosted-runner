{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card mt-4">
            <div class="card-header">
                <h2 class="h4 mb-0">🔍 Поиск тудушек</h2>
            </div>
            <div class="card-body">
                <form action="/todo/search/" method="post" class="mb-3">
                    <div class="input-group">
                        <input type="text" 
                               name="query" 
                               class="form-control" 
                               placeholder="Введите поисковый запрос..."
                               required>
                        <button type="submit" class="btn btn-primary">Поиск</button>
                    </div>
                </form>

                <div class="mt-3">
                    <small class="text-muted">Примеры запросов:</small>
                    <div class="d-flex flex-wrap gap-2 mt-2">
                        <span class="badge bg-light text-dark p-2" 
                              style="cursor: pointer;"
                              onclick="document.querySelector('[name=query]').value='красный'">
                            красный
                        </span>
                        <span class="badge bg-light text-dark p-2" 
                              style="cursor: pointer;"
                              onclick="document.querySelector('[name=query]').value='важная задача'">
                            важная задача
                        </span>
                        <span class="badge bg-light text-dark p-2" 
                              style="cursor: pointer;"
                              onclick="document.querySelector('[name=query]').value='работа'">
                            работа
                        </span>
                        <span class="badge bg-light text-dark p-2" 
                              style="cursor: pointer;"
                              onclick="document.querySelector('[name=query]').value='секретно'">
                            секретно
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-body">
                <h5 class="card-title h6">💡 Как это работает</h5>
                <ul class="small text-muted mb-0 ps-3">
                    <li>Поиск учитывает разные формы слов</li>
                    <li>Грифы секретности заменяются автоматически</li>
                    <li>Можно искать по заголовку и описанию</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const input = document.querySelector('[name=query]');
    if (input) {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                this.form.submit();
            }
        });
    }
});
</script>
{% endblock %}
